<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You -- Robertson Management Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', sans-serif;
    background: #f7f4f0;
    color: #1c1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    background: white;
    border-top: 3px solid #c80f2e;
    padding: 4rem 4rem;
    max-width: 560px;
    width: 100%;
    box-shadow: 0 4px 32px rgba(28,26,26,0.08);
    text-align: center;
  }
  .label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #c80f2e;
    margin-bottom: 1.5rem;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 500;
    color: #1c1a1a;
    margin-bottom: 1.25rem;
    line-height: 1.15;
  }
  h1 em { font-style: italic; color: #c80f2e; }
  p {
    font-size: 0.97rem;
    line-height: 1.8;
    color: #4a4545;
    margin-bottom: 2.5rem;
  }
  a {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: white;
    background: #c80f2e;
    padding: 0.9rem 2rem;
    text-decoration: none;
    display: inline-block;
    transition: background 0.2s;
  }
  a:hover { background: #a00d24; }
</style>
</head>
<body>
  <div class="card">
    <div class="label">Robertson Management Group</div>
    <h1>Message <em>received.</em></h1>
    <p>Thank you for reaching out. We'll be in touch within one business day to set up a discovery call.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
